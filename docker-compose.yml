# ═══════════════════════════════════════════════════════════════════════════
# docker-compose.yml — OpenClaw + Agentic Payment Skill
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── First-run: register the payment skill (runs once, then exits) ────
  install-skill:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-install-skill
    profiles: ["setup"]
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - openclaw-config:/home/openclaw/.openclaw
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Installing payment skill into OpenClaw via 'skills' package..."
        cd /app/agent-payments-skill
        npx -y skills add /app/agent-payments-skill \
          --agent openclaw --yes 2>/dev/null || \
          ln -sfn /app/agent-payments-skill \
                  /home/openclaw/.openclaw/skills/agent-payments-skill
        echo "✅ Payment skill installed."

  # ── Main service: gateway + payment API ─────────────────────────────
  openclaw-payments:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-payments
    restart: unless-stopped

    ports:
      - "${PAYMENT_API_PORT:-3402}:3402"        # Payment skill web API
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"  # OpenClaw gateway
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"   # OpenClaw bridge

    environment:
      # ── AWS KMS (required for production, ignored in dry-run) ───────
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_KMS_KEY_ID=${AWS_KMS_KEY_ID:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}

      # ── OpenClaw ────────────────────────────────────────────────────
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_API_KEY=${LLM_API_KEY:-}

      # ── Payment Skill ──────────────────────────────────────────────
      - CONFIG_PATH=${CONFIG_PATH:-config/default.yaml}
      - DRY_RUN=${DRY_RUN:-false}
      - DRYRUN_ENCRYPTION_KEY=${DRYRUN_ENCRYPTION_KEY:-}
      - PAYMENT_API_PORT=${PAYMENT_API_PORT:-3402}

    volumes:
      # Persist payment skill data (SQLite DB, logs)
      - payment-data:/app/agent-payments-skill/data
      - payment-logs:/app/agent-payments-skill/logs
      # Persist OpenClaw config and workspace
      - openclaw-config:/home/openclaw/.openclaw
      # Optional: mount a custom YAML config
      # - ./config/production.yaml:/app/agent-payments-skill/config/default.yaml:ro

    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:3402/api/v1/health && curl -sf http://localhost:18789/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── CLI helper container (for admin / one-off commands) ──────────────
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-payments-cli
    profiles: ["cli"]  # only starts with: docker compose run cli ...
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_KMS_KEY_ID=${AWS_KMS_KEY_ID:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - CONFIG_PATH=${CONFIG_PATH:-config/default.yaml}
      - DRY_RUN=${DRY_RUN:-false}
      - DRYRUN_ENCRYPTION_KEY=${DRYRUN_ENCRYPTION_KEY:-}
    volumes:
      - payment-data:/app/agent-payments-skill/data
      - payment-logs:/app/agent-payments-skill/logs
      - openclaw-config:/home/openclaw/.openclaw
    working_dir: /app/agent-payments-skill
    entrypoint: ["node", "dist/cli.js"]

volumes:
  payment-data:
  payment-logs:
  openclaw-config:
